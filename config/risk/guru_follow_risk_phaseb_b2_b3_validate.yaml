# Phase B log-validation profile — B2 + B3 (framework-truth path only).
#
# Intent:
#   - Exercise B2: finite max_portfolio_notional_usd_open vs E_portfolio + n.
#   - Exercise B3: max_concurrent_guru_resting_orders (guru-origin resting count).
# Intentionally OFF here:
#   - B4 / reserve (collateral_reserve_usd: 0).
#   - Capital gate path (capital_gate_enabled: false) — no Phase A mins / balance snapshot
#     requirement for this run (keeps focus on portfolio + concurrency denies).
#
# Runtime required: live + polymarket_nautilus_live + polymarket_framework_submit
#   (e.g. config/runtime/live_polymarket.yaml or live_polymarket_phaseb_validate.yaml).
# Strategy: point --strategy-conf at your usual guru_follow strategy YAML.
#
# Tuning: raise cap or concurrency limit if denies are too frequent; lower if you need
# stronger signal in logs. Values below are moderate for small-account validation.

max_order_quantity: 100.0
max_notional_usd_per_order: 25.0
max_token_notional_usd_open: 100.0

kill_switch: false
fail_on_missing_price_for_notional: true

capital_gate_enabled: false

# --- Phase B: B2 + B3 ---
max_portfolio_notional_usd_open: 75.0
fail_on_unresolved_portfolio_exposure: true
max_concurrent_guru_resting_orders: 2

collateral_reserve_usd: 0.0
