# =============================================================================
# Risk — pre-trade deployment budget, capital gate, Phase B caps (live only).
# Flat keys. Portfolio / concurrent caps require execution_mode: live.
# See Docs/OPERATIONS.md, Docs/CONFIG_MODEL.md for invalid combinations.
# =============================================================================

# -----------------------------------------------------------------------------
# Kill switch & price truth
# -----------------------------------------------------------------------------
kill_switch: false
fail_on_missing_price_for_notional: true

# -----------------------------------------------------------------------------
# Per-order deployment (USD: price_ref × quantity)
# -----------------------------------------------------------------------------
max_notional_usd_per_order: 25.0
max_notional_policy: cap # deny | cap
min_notional_usd_per_order: 0.0
min_notional_policy: deny # deny | cap

# -----------------------------------------------------------------------------
# Per-token deployment cap
# -----------------------------------------------------------------------------
# null = unlimited (pending rests + filled cost basis on that token)
max_token_notional_usd_open: null

# -----------------------------------------------------------------------------
# Portfolio & resting limits (Phase B — live + framework truth only)
# -----------------------------------------------------------------------------
# null / omitted = off
max_portfolio_notional_usd_open: null
max_concurrent_guru_resting_orders: null
# Strict vs lenient when parsing filled deployment for caps
fail_on_unresolved_portfolio_deployment: true
fail_on_unresolved_token_deployment: false

# -----------------------------------------------------------------------------
# Capital gate (Phase A — live; py-clob snapshots)
# -----------------------------------------------------------------------------
capital_gate_enabled: false
max_account_snapshot_age_seconds: 30.0
max_allowance_snapshot_age_seconds: 120.0
min_collateral_balance_usd: null
min_allowance_usd: null

# -----------------------------------------------------------------------------
# Collateral reserve (Phase B4 — BUY; requires capital_gate_enabled)
# -----------------------------------------------------------------------------
collateral_reserve_usd: 0.0
