# Risk guards (fail-closed). Tune before live.

max_order_quantity: 100.0
max_notional_usd_per_order: 25.0
max_token_notional_usd_open: 100.0

kill_switch: false
fail_on_missing_price_for_notional: true

# --- Phase A capital gate (optional; live ops) ---
# When capital_gate_enabled is true:
#   - Requires Portfolio.account present (refreshed at most every max_account_snapshot_age_seconds).
#   - min_collateral_balance_usd / min_allowance_usd compare to py-clob get_balance_allowance
#     (same snapshot; refreshed at most every max_allowance_snapshot_age_seconds when any min is set
#     or collateral_reserve_usd > 0).
# capital_gate_enabled: false
# max_account_snapshot_age_seconds: 30
# max_allowance_snapshot_age_seconds: 120
# min_collateral_balance_usd: 10
# min_allowance_usd: null
# fail_on_unresolved_position_for_token_cap: false

# --- Phase B (B0–B5); operator matrix + reason codes: Docs/OPERATIONS.md § Phase B ---
# Portfolio / concurrency gates require live + polymarket_nautilus_live + polymarket_framework_submit.
# collateral_reserve_usd > 0 requires capital_gate_enabled: true; invalid with execution_mode: shadow.
# max_portfolio_notional_usd_open: null   # unlimited (default); finite => framework-only portfolio cap (B2)
# fail_on_unresolved_portfolio_exposure: true   # default; B2 fail-closed on unresolved marks unless opted out
# max_concurrent_guru_resting_orders: null   # B3: off; integer >= 1 = deny when guru open rests >= limit (framework path; see state_readers.is_guru_resting_order)
# collateral_reserve_usd: 0   # B4: BUY requires py-clob balance >= reserve + n (after mins); same snapshot TTL as Phase A
