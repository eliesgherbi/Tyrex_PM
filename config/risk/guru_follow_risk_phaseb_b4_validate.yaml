# Phase B log-validation profile — B4 reserve + capital gate (framework-truth path).
#
# Intent:
#   - Exercise B4: BUY denied when py-clob balance < collateral_reserve_usd + n
#     (after Phase A snapshot TTLs), with tyrex_risk_ops / reason codes in logs.
#   - Exercise capital_gate_enabled: Portfolio.account + allowance snapshot path.
# Intentionally OFF here:
#   - B2 portfolio cap (unlimited — omit key → loader uses inf).
#   - B3 concurrent resting cap (omit → off).
#
# Runtime required: live + polymarket_nautilus_live + polymarket_framework_submit
#   (e.g. live_polymarket_phaseb_validate.yaml or production-like live_polymarket.yaml).
# Strategy: point --strategy-conf at your usual guru_follow strategy YAML.
#
# Note: min balance / allowance floors are not enabled (null); only reserve + snapshot
# freshness apply. Increase reserve to see more B4 denies; decrease to reduce.

max_order_quantity: 100.0
max_notional_usd_per_order: 25.0
max_token_notional_usd_open: 100.0

kill_switch: false
fail_on_missing_price_for_notional: true

# --- Phase A / B4: gate + snapshots (reserve requires capital gate) ---
capital_gate_enabled: true
max_account_snapshot_age_seconds: 30
max_allowance_snapshot_age_seconds: 120
min_collateral_balance_usd: null
min_allowance_usd: null

# B4: positive reserve; loader requires capital_gate_enabled: true
collateral_reserve_usd: 25.0

# --- Phase B: B2/B3 off (defaults: unlimited portfolio cap, no concurrency cap) ---
fail_on_unresolved_portfolio_exposure: true
