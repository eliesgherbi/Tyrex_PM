# =============================================================================
# Scenario strategy — Layer A demo (see README.md in this folder).
# Replace guru_wallet_address before running.
# =============================================================================

guru_wallet_address: "0x2005d16a84ceefa912d4e380cd32e7ff827875ea"

token_filter:
  enabled: false
  allowlisted_token_ids: []

copy_scale: 1.0

conviction_sizing_enabled: false
conviction_sizing_cap: 2.0
conviction_sizing_lookback_trades: 20

# Layer A: static USD floor + median vs prior BUYs (both on for this scenario).
filters:
  exit_filter:
    enabled: false
    exit_method: mirror_guru # full_exit requires follower context; see CONFIG_MODEL
  significance_filter:
    static_amount:
      enabled: true
      amount_usd: 50.0
    significance_conviction:
      enabled: true
      lookback_trades: 20
      threshold_method: median

strategy_dedup_state_path: null
