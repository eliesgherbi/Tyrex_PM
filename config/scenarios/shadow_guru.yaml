execution_mode: shadow
runtime:
  shadow_bootstrap:
    usdc_balance: "1000000"
    usdc_allowance: "1000000"
guru:
  data_api_poll_interval_s: 1

# Shadow guru_follow: synthetic USDC, fast guru poll, relaxed notional caps for fixtures.
# Allocation ledger still required; guru SELL sizes vs guru_follow allocation (P5).
# Loosen caps so fixture signals flow through risk without clipping below venue_min_size.
risk:
  notional:
    min_usd: "1"
    max_usd: "100"
  deployment:
    token_cap_usd: "500"
    portfolio_cap_usd: "5000"
