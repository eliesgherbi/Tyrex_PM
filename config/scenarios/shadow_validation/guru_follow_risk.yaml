# =============================================================================
# Risk — shadow validation scenario (safe for execution_mode: shadow in paired runtime)
# No finite portfolio cap or concurrent-rest limit (required for shadow compose).
# For live Phase B stress tests, use config/risk/guru_follow_risk_phaseb_*.yaml.
# =============================================================================

# -----------------------------------------------------------------------------
# Kill switch & price truth
# -----------------------------------------------------------------------------
kill_switch: false
fail_on_missing_price_for_notional: true

# -----------------------------------------------------------------------------
# Per-order deployment
# -----------------------------------------------------------------------------
max_notional_usd_per_order: 10.0
max_notional_policy: cap
min_notional_usd_per_order: 0.0
min_notional_policy: deny

# -----------------------------------------------------------------------------
# Per-token deployment
# -----------------------------------------------------------------------------
max_token_notional_usd_open: null

# -----------------------------------------------------------------------------
# Portfolio & resting limits (off — shadow-compatible)
# -----------------------------------------------------------------------------
max_portfolio_notional_usd_open: null
fail_on_unresolved_portfolio_deployment: true
max_concurrent_guru_resting_orders: null
fail_on_unresolved_token_deployment: false

# -----------------------------------------------------------------------------
# Capital gate & reserve
# -----------------------------------------------------------------------------
capital_gate_enabled: false
max_account_snapshot_age_seconds: 30.0
max_allowance_snapshot_age_seconds: 120.0
min_collateral_balance_usd: null
min_allowance_usd: null
collateral_reserve_usd: 0.0
