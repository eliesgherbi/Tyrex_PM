# Shadow scenario for sell_test. Loosens notional caps; seeds synthetic USDC.
# SELL sizing still clamps to sell_test owner allocation (allocation ledger required).
execution_mode: shadow

risk:
  notional:
    min_usd: "1"
    max_usd: "100"
  deployment:
    token_cap_usd: "500"
    portfolio_cap_usd: "5000"

runtime:
  shadow_bootstrap:
    usdc_balance: "1000000"
    usdc_allowance: "1000000"
