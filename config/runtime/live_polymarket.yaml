# =============================================================================
# Runtime — how the Tyrex process runs (ingest, venue, instruments, optional
# book hooks, reporting). Secrets only in .env (e.g. POLYMARKET_PK).
#
# Flat keys: loaders expect top-level fields (no nested grouping objects).
# Sections below are comment-only for operators.
# =============================================================================

# -----------------------------------------------------------------------------
# Run identity & mode
# -----------------------------------------------------------------------------
trader_id: "TYREX-GURU-001"
# shadow = no venue submit; live = Nautilus Polymarket data + exec + submit_order
execution_mode: live

# -----------------------------------------------------------------------------
# Guru — REST poller (Data API)
# -----------------------------------------------------------------------------
guru_poll_interval_seconds: 30.0
data_api_base_url: "https://data-api.polymarket.com"
guru_state_path: "var/guru_watermark.json"
guru_dedup_state_path: "var/guru_dedup.json"
guru_activity_limit: 200
guru_max_activity_pages_per_poll: 4
# History window pulled once at cold start (0 = watermark-only behavior).
guru_startup_backfill_seconds: 0.0

# -----------------------------------------------------------------------------
# Guru — ingest mode (RTDS WebSocket + poll fallback / gap-fill)
# -----------------------------------------------------------------------------
# poll_only | rtds_shadow (compare stream vs poll) | rtds_primary (stream publishes)
guru_ingest_mode: rtds_primary
guru_ingest_phase: "0"
guru_rtds_url: "wss://ws-live-data.polymarket.com"
guru_rtds_liveness_timeout_seconds: 120.0
guru_rtds_reconnect_retry_initial_seconds: 1.0
guru_rtds_reconnect_retry_max_seconds: 60.0
guru_rtds_ping_interval_seconds: 5.0
guru_poll_fallback_enabled: true
guru_poll_fallback_interval_seconds: null
guru_gap_fill_enabled: true
guru_gap_fill_lookback_seconds: 60.0
guru_proxy_wallet_validation_required: false
guru_stream_queue_drain_interval_ms: 50

# -----------------------------------------------------------------------------
# Process logging & chain
# -----------------------------------------------------------------------------
logging_level: INFO
clob_host: "https://clob.polymarket.com"
chain_id: 137

# -----------------------------------------------------------------------------
# Polymarket — instrument list, Gamma, dynamic resolution
# -----------------------------------------------------------------------------
# [] = zero-bootstrap from guru activity; non-empty = fixed InstrumentId list
polymarket_instrument_ids: []
# With non-empty ids: opt-in extras. With empty ids on live: implied on.
polymarket_dynamic_instruments: true
polymarket_dynamic_max_activations: 32
polymarket_gamma_base_url: "https://gamma-api.polymarket.com"
polymarket_gamma_http_timeout_seconds: 15.0
# Pre-resolve up to N guru tokens from /activity at node build (0 = skip)
polymarket_startup_token_warmup_max: 32

# -----------------------------------------------------------------------------
# Live execution — optional book-driven hooks (framework path only)
# Order-size policy is risk YAML, not here. Internal tick/step quantize always runs.
# -----------------------------------------------------------------------------
execution_entry_guard_enabled: false
execution_max_entry_slippage_ticks: 0
execution_book_depth_clip_enabled: false
execution_book_depth_utilization_cap: 1.0
execution_book_rest_snapshot_enabled: false
execution_book_strict: false
execution_limit_timeout_enabled: false
execution_limit_timeout_seconds: 30.0

# -----------------------------------------------------------------------------
# Reporting — structured facts under reporting_base_dir
# -----------------------------------------------------------------------------
reporting_enabled: true
reporting_base_dir: "var/reporting/runs"
reporting_sink_max_queue: 50000
reporting_sink_batch_size: 128
reporting_capital_observability_enabled: true
reporting_capital_snapshot_period_seconds: 300.0
