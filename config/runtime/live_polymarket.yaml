# Runtime: shadow vs live, polling, logging. Secrets stay in .env only.

trader_id: "TYREX-GURU-001"

execution_mode: live #shadow

guru_poll_interval_seconds: 30.0
data_api_base_url: "https://data-api.polymarket.com"

# Incremental guru polling: watermark file + optional dedup safety net
guru_state_path: "var/guru_watermark.json"
guru_dedup_state_path: "var/guru_dedup.json"
guru_activity_limit: 200
guru_max_activity_pages_per_poll: 4
guru_startup_backfill_seconds: 0

logging_level: INFO

clob_host: "https://clob.polymarket.com"
chain_id: 137

# --- Polymarket / Nautilus (Path A + Step 4) ---
# All are read by config/runtime loaders; secrets stay in .env only.
#
# polymarket_nautilus_live: register Polymarket live data + exec on TradingNode.
# polymarket_framework_submit: guru submit via Nautilus (requires nautilus live). With an
#   **empty** polymarket_instrument_ids list, Tyrex uses **zero-bootstrap** guru mode (dynamic
#   resolve + optional warmup); see Docs/Implementation/step_5_runtime_integration.md.
# polymarket_instrument_ids: optional full InstrumentId strings (YAML overlay / bootstrap).
# polymarket_dynamic_instruments: opt-in when you have a non-empty list; if ids are **empty**,
#   dynamic mode is **implicit** (loader sets it true).
# polymarket_dynamic_max_activations / polymarket_startup_token_warmup_max / gamma keys: Step 5.
#
# .env: POLYMARKET_PK + L2 vars (or PK-only derivation). Run: scripts/run_guru.py
polymarket_nautilus_live: true
polymarket_framework_submit: true
polymarket_instrument_ids: []
# polymarket_startup_token_warmup_max: 32
# polymarket_dynamic_max_activations: 32
