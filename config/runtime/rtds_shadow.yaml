# Runtime: C1 RTDS shadow validation only.
#
# Use a FRESH watermark + dedup under var/rtds_shadow/ so poll vs stream comparison
# is not skewed by history in var/guru_*.json (normal live paths).
#
#   python scripts/run_guru.py \
#     --strategy-conf config/strategy/guru_follow.yaml \
#     --risk-conf config/risk/guru_follow_risk.yaml \
#     --live-conf config/runtime/rtds_shadow.yaml
#
# Optional: --log-name rtds_shadow for logs/live/rtds_shadow_*.log
#
# If strategy YAML sets strategy_dedup_state_path, it overrides guru_dedup_state_path
# for the guru actors — leave that key unset or point it under var/rtds_shadow/.

trader_id: "TYREX-GURU-001"

execution_mode: live # shadow

guru_poll_interval_seconds: 30.0
data_api_base_url: "https://data-api.polymarket.com"

# Isolated state — do not point at normal live var/guru_*.json
guru_state_path: "var/rtds_shadow/guru_watermark.json"
guru_dedup_state_path: "var/rtds_shadow/guru_dedup.json"
guru_activity_limit: 200
guru_max_activity_pages_per_poll: 4
# Fresh window: no historical backfill from watermark initialization
guru_startup_backfill_seconds: 0

guru_ingest_mode: rtds_shadow

logging_level: INFO

clob_host: "https://clob.polymarket.com"
chain_id: 137

polymarket_nautilus_live: true
polymarket_framework_submit: true
polymarket_instrument_ids: []
