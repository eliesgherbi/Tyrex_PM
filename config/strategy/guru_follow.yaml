# =============================================================================
# Strategy — guru target, token universe, copy sizing, optional conviction (C2),
# optional Layer A filters (``filters:`` — see Docs/CONFIG_MODEL.md).
# Top-level ``token_filter`` remains required and canonical.
# =============================================================================

# -----------------------------------------------------------------------------
# Guru target
# -----------------------------------------------------------------------------
# Wallet to follow: 0x + 40 hex. Replace with your guru.
guru_wallet_address: "0x1234567890123456789012345678901234567890"

# -----------------------------------------------------------------------------
# Token universe (filter)
# -----------------------------------------------------------------------------
# enabled=true → only allowlisted_token_ids (non-empty). false → all guru tokens.
token_filter:
  enabled: false
  allowlisted_token_ids: []

# -----------------------------------------------------------------------------
# Copy sizing
# -----------------------------------------------------------------------------
# Multiplier on guru-sized quantity before risk (1.0 = match guru at strategy layer).
copy_scale: 1.0

# -----------------------------------------------------------------------------
# Conviction overlay (C2) — optional entry sizing vs rolling guru size
# -----------------------------------------------------------------------------
conviction_sizing_enabled: false
conviction_sizing_cap: 2.0
conviction_sizing_lookback_trades: 20

# -----------------------------------------------------------------------------
# Layer A — signal gating + exit interpretation (optional; all off = legacy behavior)
# -----------------------------------------------------------------------------
filters:
  exit_filter:
    enabled: false
    exit_method: mirror_guru
  significance_filter:
    static_amount:
      enabled: false
      amount_usd: 700.0
    significance_conviction:
      enabled: false
      lookback_trades: 20
      threshold_method: median

# -----------------------------------------------------------------------------
# Strategy-local paths
# -----------------------------------------------------------------------------
# null → use runtime guru_dedup_state_path for strategy dedup
strategy_dedup_state_path: null
